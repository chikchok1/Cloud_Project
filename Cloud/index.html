<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three Sons Cinema</title>
    <link rel="stylesheet" href="index.css" />
    <!-- CSS 파일 연결 -->
  </head>
  <body>
    <!-- 상단 메뉴 -->
    <div class="header">
      <h1>Three Sons Cinema</h1>
      <div class="menu">
        <a href="#">로그인</a>
        <a href="#">회원가입</a>
        <a href="#">마이페이지</a>
      </div>
    </div>

    <!-- 네비게이션 바 -->
    <div class="navbar">
      <a href="#">영화</a>
      <a href="#">예매</a>
      <a href="#">매점</a>
      <a href="#">추천</a>
    </div>
    <!-- 동영상 배경 섹션 -->
    <div class="video-section">
      <video autoplay muted loop class="background-video">
        <source src="image/tra.mp4" type="video/mp4" />
        <!-- 동영상 파일 경로를 수정해 주세요 -->
      </video>
      <div class="video-overlay">
        <h2>트라페지움</h2>
        <p>'봇치더록' 제작사가 선보이는 청춘X아이돌 무비! 11/14 개봉</p>
        <button>상세보기</button>
      </div>
    </div>
    <!-- 영화 섹션 -->
    <div class="movies">
      <div class="movie-container">
        <div class="movie-card">
          <img src="image/glady.jpg" alt="영화 포스터" />
          <div class="overlay">
            <button>상세보기</button>
            <button>예매하기</button>
          </div>
        </div>
        <div class="movie-title">글래디에이터<br />예매율 : 75%</div>
      </div>

      <div class="movie-container">
        <div class="movie-card">
          <img src="image/wikid.jpg" alt="영화 포스터" />
          <div class="overlay">
            <button>상세보기</button>
            <button>예매하기</button>
          </div>
        </div>
        <div class="movie-title">위키드<br />예매율: 65%</div>
      </div>

      <div class="movie-container">
        <div class="movie-card">
          <img src="image/sul.jpg" alt="영화 포스터" />
          <div class="overlay">
            <button>상세보기</button>
            <button>예매하기</button>
          </div>
        </div>
        <div class="movie-title">영화 제목<br />예매율</div>
      </div>

      <div class="movie-container">
        <div class="movie-card">
          <img src="image/four.jpg" alt="영화 포스터" />
          <div class="overlay">
            <button>상세보기</button>
            <button>예매하기</button>
          </div>
        </div>
        <div class="movie-title">영화 제목<br />예매율</div>
      </div>

      <div class="movie-container">
        <div class="movie-card">
          <img src="image/hidden.jpg" alt="영화 포스터" />
          <div class="overlay">
            <button>상세보기</button>
            <button>예매하기</button>
          </div>
        </div>
        <div class="movie-title">영화 제목<br />예매율</div>
      </div>
    </div>
  </body>
</html>
