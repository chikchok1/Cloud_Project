<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three Sons Cinema</title>
    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <!-- 상단 메뉴 -->
    <div class="header">
      <h1><a href="index.html">Three Sons Cinema</a></h1>
      <div class="menu">
        <a href="login.html">로그인</a>
        <a href="newClient.html">회원가입</a>
        <a href="#">마이페이지</a>
      </div>
    </div>

    <!-- 네비게이션 바 -->
    <div class="navbar">
      <a href="showingmoive.html">영화</a>
      <a href="reservation.html">예매</a>
      <a href="#">매점</a>
      <a href="suggest.html">추천</a>
    </div>

    <!-- 로그인 화면 -->
    <main>
      <form action="/login" method="post" class="login-form">
        <h2>로그인</h2>
        <div class="form-group">
          <label for="username">아이디</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="아이디를 입력하세요"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="비밀번호를 입력하세요"
            required
          />
        </div>

        <button type="submit" class="btn">로그인</button>
        <p class="register-link"><a href="#">회원가입</a></p>
      </form>
    </main>
  </body>
</html>
