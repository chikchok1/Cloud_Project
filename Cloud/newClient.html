<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three Sons Cinema</title>
    <link rel="stylesheet" href="newClient.css" />
  </head>

  <body>
    <!-- 상단 메뉴 -->
    <div class="header">
      <h1><a href="index.html">Three Sons Cinema</a></h1>
      <div class="menu">
        <a href="login.html">로그인</a>
        <a href="newClient.html">회원가입</a>
        <a href="#">마이페이지</a>
      </div>
    </div>

    <!-- 네비게이션 바 -->
    <div class="navbar">
      <a href="showingmoive.html">영화</a>
      <a href="reservation.html">예매</a>
      <a href="food_combo.html">매점</a>
      <a href="suggest.html">추천</a>
    </div>

    <div class="container">
      <h2>회원가입</h2>
      <form id="signup-form">
        <div class="form-group">
          <label for="username">아이디</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="아이디를 입력하세요"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="비밀번호를 입력하세요"
            required
          />
        </div>
        <div class="form-group">
          <label for="confirm-password">비밀번호 확인</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="비밀번호를 다시 입력하세요"
            required
          />
        </div>
        <div class="form-group">
          <button type="submit">회원가입</button>
        </div>
      </form>
      <div class="links">
        <a href="login.html">로그인</a>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("signup-form");
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirm-password");

        form.addEventListener("submit", function (event) {
          // 비밀번호와 비밀번호 확인이 일치하는지 확인
          if (password.value !== confirmPassword.value) {
            event.preventDefault(); // 폼 제출 막기
            alert("비밀번호가 일치하지 않습니다.");
          } else {
            alert("회원가입이 완료되었습니다!");
          }
        });
      });
    </script>
  </body>
</html>
