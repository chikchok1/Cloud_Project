<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three Sons Cinema</title>
    <link rel="stylesheet" href="newClient.css" />
  </head>

  <body>
    <!-- 상단 메뉴 -->
    <div class="header">
      <div class="header_content">
        <div class="contents">
          <h1 class="title">
            <a href="index.html">
              Three Sons
              <span>Movie Cinema</span></a
            >
          </h1>
          <ul class="memberInfo">
            <li>
              <a href="login.html">
                <img
                  src="https://img.cgv.co.kr/R2014/images/common/ico/loginPassword.png"
                  alt="로그인"
                />
                <span>로그인</span>
              </a>
            </li>
            <li>
              <a href="newClient.html">
                <img
                  src="https://img.cgv.co.kr/R2014/images/common/ico/loginJoin.png"
                  alt="회원가입"
                />
                <span>회원가입</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img
                  src="https://img.cgv.co.kr/R2014/images/common/ico/loginMember.png"
                  alt="마이페이지"
                />
                <span>마이페이지</span>
              </a>
            </li>
          </ul>
        </div>
        <hr />
      </div>
      <div class="nav">
        <div class="contents">
          <ul class="nav-menu">
            <li>
              <h2>
                <a href="showingmoive.html">영화</a>
              </h2>
            </li>
            <li>
              <h2>
                <a href="reservation.html">예매</a>
              </h2>
            </li>
            <li>
              <h2>
                <a href="food_combo.html">매점</a>
              </h2>
            </li>
            <li>
              <h2>
                <a href="suggest.html">추천</a>
              </h2>
            </li>
          </ul>
        </div>
        <hr />
      </div>
    </div>
    <div class="container">
      <h2>회원가입</h2>
      <form id="signup-form">
        <div class="form-group">
          <label for="username">아이디</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="아이디를 입력하세요"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="비밀번호를 입력하세요"
            required
          />
        </div>
        <div class="form-group">
          <label for="confirm-password">비밀번호 확인</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="비밀번호를 다시 입력하세요"
            required
          />
        </div>
        <div class="form-group">
          <button type="submit">회원가입</button>
        </div>
      </form>
      <div class="links">
        <a href="login.html">로그인</a>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("signup-form");
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirm-password");

        form.addEventListener("submit", function (event) {
          // 비밀번호와 비밀번호 확인이 일치하는지 확인
          if (password.value !== confirmPassword.value) {
            event.preventDefault(); // 폼 제출 막기
            alert("비밀번호가 일치하지 않습니다.");
          } else {
            alert("회원가입이 완료되었습니다!");
          }
        });
      });
    </script>
  </body>
</html>
