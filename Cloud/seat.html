<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three Sons Cinema - 좌석 선택</title>
    <link rel="stylesheet" href="seat_style.css" />
    <!-- CSS 파일 연결 -->
  </head>
  <body>
    <!-- 상단 메뉴 -->
    <div class="header">
      <h1><a href="index.html">Three Sons Cinema</a></h1>
      <div class="menu">
        <a href="login.html">로그인</a>
        <a href="newClient.html">회원가입</a>
        <a href="#">마이페이지</a>
      </div>
    </div>

    <!-- 네비게이션 바 -->
    <div class="navbar">
      <a href="showingmoive.html">영화</a>
      <a href="reservation.html">예매</a>
      <a href="food_combo.html">매점</a>
      <a href="suggest.html">추천</a>
    </div>

    <!-- 인원 선택 영역 -->
    <div class="count-selection">
      <div class="seat-info">
        <div class="age-groups">
          <div class="age-group">
            <label>일반</label>
            <div class="seats-row">
              <div class="count">1</div>
              <div class="count">2</div>
              <div class="count">3</div>
              <div class="count">4</div>
              <div class="count">5</div>
            </div>
          </div>
          <div class="age-group">
            <label>청소년</label>
            <div class="seats-row">
              <div class="count">1</div>
              <div class="count">2</div>
              <div class="count">3</div>
              <div class="count">4</div>
              <div class="count">5</div>
            </div>
          </div>
          <div class="age-group">
            <label>경로</label>
            <div class="seats-row">
              <div class="count">1</div>
              <div class="count">2</div>
              <div class="count">3</div>
              <div class="count">4</div>
              <div class="count">5</div>
            </div>
          </div>
          <div class="age-group">
            <label>우대</label>
            <div class="seats-row">
              <div class="count">1</div>
              <div class="count">2</div>
              <div class="count">3</div>
              <div class="count">4</div>
              <div class="count">5</div>
            </div>
          </div>
        </div>
        <div class="vertical-divider"></div>
        <div class="date-display">2024.11.11(월) 18:00 ~ 20:05</div>
      </div>
    </div>
    <div class="seat-selection">
      <div class="screen-area">
        <div class="screen">SCREEN</div>
        <div class="seats">
          <!-- 좌석 행 -->
          <div class="seat-row">
            <div class="row-label">A</div>
            <div class="seat">1</div>
            <div class="seat">2</div>
            <div class="seat">3</div>
            <div class="seat">4</div>
            <div class="seat">5</div>
          </div>
          <div class="seat-row">
            <div class="row-label">B</div>
            <div class="seat">1</div>
            <div class="seat">2</div>
            <div class="seat">3</div>
            <div class="seat">4</div>
            <div class="seat">5</div>
          </div>
          <div class="seat-row">
            <div class="row-label">C</div>
            <div class="seat">1</div>
            <div class="seat">2</div>
            <div class="seat">3</div>
            <div class="seat">4</div>
            <div class="seat">5</div>
          </div>
          <div class="seat-row">
            <div class="row-label">D</div>
            <div class="seat">1</div>
            <div class="seat">2</div>
            <div class="seat">3</div>
            <div class="seat">4</div>
            <div class="seat">5</div>
          </div>
        </div>
      </div>

      <button class="pay-button">결제하기</button>
    </div>
    <!-- 추가된 이미지 -->
    <div class="movie-poster">
      <img
        src="image/fire.jpg"
        alt="소방관 영화 포스터"
        style="
          width: 100%;
          max-width: 1000px;
          margin: 20px auto;
          display: block;
        "
      />
    </div>
    <script>
      // 인원 클릭 시 색상이 바뀌도록 이벤트 추가
      document.querySelectorAll(".count").forEach((seat) => {
        seat.addEventListener("click", function () {
          this.classList.toggle("counted"); // 선택된 좌석 색상 변경
        });
      });
      // 좌석 클릭 시 색상이 바뀌도록 이벤트 추가
      document.querySelectorAll(".seat").forEach((seat) => {
        seat.addEventListener("click", function () {
          this.classList.toggle("selected"); // 선택된 좌석 색상 변경
        });
      });
    </script>
  </body>
</html>
