    <!-- 인원 선택 영역 -->

          <div class="age-group">
            <label>청소년</label>
            <div class="seats-row">
              <div class="count">1</div>
              <div class="count">2</div>
              <div class="count">3</div>
              <div class="count">4</div>
              <div class="count">5</div>
            </div>
          </div>
          <div class="age-group">
            <label>경로</label>
            <div class="seats-row">
              <div class="count">1</div>
              <div class="count">2</div>
              <div class="count">3</div>

          <div class="age-group">

            <div class="seats-row">

        </div>

    </div>
    <div class="seat-selection">
      <div class="screen-area">
        <div class="screen">SCREEN</div>
        <div class="seats">
          <!-- 좌석 행 -->
          <div class="seat-row">
            <div class="row-label">A</div>

            <div class="seat">5</div>
          </div>
          <div class="seat-row">
            <div class="row-label">C</div>
            <div class="seat">1</div>
            <div class="seat">2</div>
            <div class="seat">3</div>

          </div>
          <div class="seat-row">

            <div class="seat">1</div>

      <button class="pay-button" id="payButton">결제하기</button>
    </div>
    <!-- 추가된 이미지 -->
    <div class="movie-poster">
      <img
        src="image/fire.jpg"
        alt="소방관 영화 포스터"
        style="
          width: 100%;
          max-width: 1000px;
          margin: 20px auto;
          display: block;
        "
      />
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // URL 업데이트 함수 정의 (이벤트 리스너 이전)
        function updateURL() {
          const params = new URLSearchParams(window.location.search);

          // 인원 정보 업데이트
          const ageGroups = ["일반", "청소년", "경로", "우대"];
          ageGroups.forEach((ageGroup, index) => {
            const selectedCount = document
              .querySelectorAll(".age-group")
              [index]?.querySelector(".count.counted")?.textContent;
            params.set(ageGroup, selectedCount || "0");
          });

          // 좌석 정보 업데이트
          const selectedSeats = [];
          document.querySelectorAll(".seat.selected").forEach((seat) => {
            const row = seat
              .closest(".seat-row")
              .querySelector(".row-label").textContent;
            const number = seat.textContent;
            selectedSeats.push(`${row}${number}`);
          });

          if (selectedSeats.length > 0) {
            params.set("seats", selectedSeats.join(",")); // 좌석 정보를 쉼표로 구분
          } else {
            params.delete("seats"); // 선택된 좌석이 없으면 삭제
          }

          // URL 업데이트
          const newURL = `${window.location.pathname}?${params.toString()}`;
          window.history.replaceState({}, "", newURL);
        }

        // 인원 클릭 시 색상이 바뀌도록 이벤트 추가
        document.querySelectorAll(".count").forEach((seat) => {
          seat.addEventListener("click", function () {
            this.classList.toggle("counted"); // 선택된 좌석 색상 변경
            updateURL(); // URL 업데이트 호출
          });
        });

        // 좌석 클릭 시 색상이 바뀌도록 이벤트 추가
        document.querySelectorAll(".seat").forEach((seat) => {
          seat.addEventListener("click", function () {
            this.classList.toggle("selected"); // 선택된 좌석 색상 변경
            updateURL(); // URL 업데이트 호출
          });
        });

        // 결제 버튼 클릭 이벤트
        const payButton = document.getElementById("payButton");
        if (payButton) {
          payButton.addEventListener("click", function () {
            try {
              // 현재 URL의 쿼리 문자열을 그대로 사용하여 이동
              const currentSearch = window.location.search;
              console.log("Navigating to:", `pay.html${currentSearch}`); // 디버깅용 로그
              window.location.href = `pay.html${currentSearch}`; // 페이지 이동
            } catch (error) {
              console.error("Error during navigation:", error);
            }
          });
        } else {
          console.error("Pay button not found.");
        }
      });

      function getQueryParams() {
        const params = new URLSearchParams(window.location.search); // 현재 URL의 쿼리 문자열 가져오기
        return {
          movie: params.get("movie"), // "movie" 파라미터 값 가져오기
          date: params.get("date"), // "date" 파라미터 값 가져오기
          screen: params.get("screen"), // "screen" 파라미터 값 가져오기
          time: params.get("time"), // "time" 파라미터 값 가져오기
        };
      }

      // URL에서 데이터 가져오기
      const { movie, date, screen, time } = getQueryParams();

      // 가져온 데이터를 HTML에 표시
      document.getElementById("movie-title").textContent = movie || "선택 안됨";
      document.getElementById("movie-date").textContent = date || "선택 안됨";
      document.getElementById("movie-screen").textContent =
        screen || "선택 안됨";
      document.getElementById("movie-time").textContent = time || "선택 안됨";

      console.log("Parsed Params:", { movie, date, screen, time });
    </script>
  </body>
