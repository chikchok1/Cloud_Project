<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three Sons Cinema - 좌석 선택</title>
    <link rel="stylesheet" href="seat_style.css" />
    <!-- CSS 파일 연결 -->
  </head>
  <body>
    <!-- 상단 메뉴 -->
    <div class="header">
      <h1><a href="index.html">Three Sons Cinema</a></h1>
      <div class="menu">
        <a href="#">로그인</a>
        <a href="#">회원가입</a>
        <a href="#">마이페이지</a>
      </div>
    </div>

    <!-- 네비게이션 바 -->
    <div class="navbar">
      <a href="showingmoive.html">영화</a>
      <a href="#">예매</a>
      <a href="#">매점</a>
      <a href="suggest.html">추천</a>
    </div>

    <!-- 인원 선택 영역 -->
    <div class="count-selection">
      <div class="seat-info">
        <div class="age-group">
          <label>일반</label>
          <div class="seats-row">
            <div class="count">1</div>
            <div class="count">2</div>
            <div class="count">3</div>
            <div class="count">4</div>
            <div class="count">5</div>
          </div>
        </div>
        <div class="age-group">
          <label>청소년</label>
          <div class="seats-row">
            <div class="count">1</div>
            <div class="count">2</div>
            <div class="count">3</div>
            <div class="count">4</div>
            <div class="count">5</div>
          </div>
        </div>
        <div class="age-group">
          <label>경로</label>
          <div class="seats-row">
            <div class="count">1</div>
            <div class="count">2</div>
            <div class="count">3</div>
            <div class="count">4</div>
            <div class="count">5</div>
          </div>
        </div>
        <div class="age-group">
          <label>우대</label>
          <div class="seats-row">
            <div class="count">1</div>
            <div class="count">2</div>
            <div class="count">3</div>
            <div class="count">4</div>
            <div class="count">5</div>
          </div>
        </div>

        <p class="movie-time">2024.11.11(월) 18:00 ~ 20:05</p>
      </div>
    </div>
    <div class="seat-selection">
      <div class="screen-area">
        <div class="screen">SCREEN</div>
        <div class="seats">
          <!-- 좌석 행 -->
          <div class="seat-row">
            <div class="seat">a1</div>
            <div class="seat">a2</div>
            <div class="seat">a3</div>
            <div class="seat">a4</div>
            <div class="seat">a5</div>
          </div>
          <div class="seat-row">
            <div class="seat">b1</div>
            <div class="seat">b2</div>
            <div class="seat">b3</div>
            <div class="seat">b4</div>
            <div class="seat">b5</div>
          </div>
          <div class="seat-row">
            <div class="seat">c1</div>
            <div class="seat">c2</div>
            <div class="seat">c3</div>
            <div class="seat">c4</div>
            <div class="seat">c5</div>
          </div>
          <div class="seat-row">
            <div class="seat">d1</div>
            <div class="seat">d2</div>
            <div class="seat">d3</div>
            <div class="seat">d4</div>
            <div class="seat">d5</div>
          </div>
        </div>
      </div>
      <button class="pay-button">결제하기</button>
    </div>
    <!-- 추가된 이미지 -->
    <div class="movie-poster">
      <img
        src="image/fire.jpg"
        alt="소방관 영화 포스터"
        style="
          width: 100%;
          max-width: 1000px;
          margin: 20px auto;
          display: block;
        "
      />
    </div>
    <script>
      // 인원 클릭 시 색상이 바뀌도록 이벤트 추가
      document.querySelectorAll(".count").forEach((seat) => {
        seat.addEventListener("click", function () {
          this.classList.toggle("counted"); // 선택된 좌석 색상 변경
        });
      });
      // 좌석 클릭 시 색상이 바뀌도록 이벤트 추가
      document.querySelectorAll(".seat").forEach((seat) => {
        seat.addEventListener("click", function () {
          this.classList.toggle("selected"); // 선택된 좌석 색상 변경
        });
      });
    </script>
  </body>
</html>
