<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>영화 예매 시스템</title>
    <link rel="stylesheet" href="food.css" />
</head>
<body>
    <!-- 상단 메뉴 -->
    <div class="header">
        <h1>Three Sons Cinema</h1>
        <div class="menu">
            <a href="#">로그인</a>
            <a href="#">회원가입</a>
            <a href="#">마이페이지</a>
        </div>
    </div>
  
    <!-- 네비게이션 바 -->
    <div class="navbar">
        <a href="#">영화</a>
        <a href="#">예매</a>
        <a href="#">매점</a>
        <a href="#">추천</a>
    </div>

    <div class = "title">
        <h1>매점</h1>
        <hr>
    </div>

    <div class="menu-bar">
        <div class="categories">
            <a href="#">콤보</a>
            <a href="#">팝콘</a>
            <a href="#">음료</a>
            <a href="#">간식</a>
        </div>
        <hr>
    </div>
    <br>
    <div class="menu-title">
        <h1>음료 <span class="subtitle">탄산음료부터 에이드까지, 마시는 즐거움!</span></h1>
        <hr>
    </div>

    <div class="content">
        <div class = "list-grid">
                <div class="list-card">
                    <img src="image/Ldrink.png" alt="음료" />
                    <div class="movie-title">
                        <h3>탄산음료(L)</h3>
                        <h4>탄산음료(L)</h4>
                        <h4>3,500원</h4>
                    </div>
                </div>
                <div class="list-card">
                    <img src="image/Mdrink.png" alt="음료" />
                    <div class="movie-title">
                        <h3>탄산음료(M)</h3>
                        <h4>탄산음료(M)</h4>
                        <h4>3,000원</h4>
                    </div>
                </div>
        </div>
    </div>
    

</body>
</html>
