<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>영화 예매 시스템</title>
    <link rel="stylesheet" href="food.css" />
</head>
<body>
    <!-- 상단 메뉴 -->
    <div class="header">
        <h1>Three Sons Cinema</h1>
        <div class="menu">
            <a href="#">로그인</a>
            <a href="#">회원가입</a>
            <a href="#">마이페이지</a>
        </div>
    </div>
  
    <!-- 네비게이션 바 -->

        <a href="#">예매</a>
        <a href="#">매점</a>

    <div class = "title">

    <br>

    <div class="content">
        <div class = "list-grid">
                <div class="list-card">
                    <img src="image/nacho.png" alt="스낵" />

                </div>

                    <div class="movie-title">
                        <h3>칠리치즈핫도그</h3>
                        <h4>칠리치즈핫도그</h4>
                        <h4>5,500원</h4>
                    </div>
                </div>
                <div class="list-card">
                    <img src="image/hotdog2.png" alt="스낵" />
                    <div class="movie-title">
                        <h3>플레인핫도그</h3>
