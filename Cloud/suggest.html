<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three Sons Cinema</title>
    <link rel="stylesheet" href="suggest_style.css" />
  </head>
  <body>
    <div class="header">
      <h1>Three Sons Cinema</h1>
      <div class="menu">
        <a href="#">로그인</a>
        <a href="#">회원가입</a>
        <a href="#">마이페이지</a>
      </div>
    </div>

    <!-- 네비게이션 바 -->
    <div class="navbar">
      <a href="#">영화</a>
      <a href="#">예매</a>
      <a href="#">매점</a>
      <a href="#">추천</a>
    </div>
    <div class="container">
      <div class="filter-section">
        <select>
          <option selected disabled>장르</option>
          <option>액션</option>
          <option>코미디</option>
          <option>드라마</option>
          <!-- 추가 장르 선택 옵션 -->
        </select>
        <select>
          <option selected disabled>나이제한</option>
          <option>전체관람가</option>
          <option>12세 이상</option>
          <option>15세 이상</option>
          <option>청소년 관람불가</option>
        </select>
        <select>
          <option selected disabled>별점수</option>
          <option>★5.0</option>
          <option>★4.0</option>
          <option>★3.0</option>
          <option>★2.0</option>
          <option>★1.0</option>
        </select>
        <input type="text" placeholder="검색 키워드" />
        <div class="search-btn">
          <button>초기화</button>
          <button>검색</button>
        </div>
      </div>
    </div>
  </body>
</html>
