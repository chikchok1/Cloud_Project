  <script>
    // 화면슬라이더 JS
    let currentIndex = 0;

    function showNextSlide() {
      const slides = document.querySelector(".slides");
      const totalSlides = slides.children.length;

      // 슬라이드 이동
      slides.style.transform = `translateX(-${currentIndex * 100}%)`;

      // 현재 슬라이드 인덱스 업데이트
      currentIndex = (currentIndex + 1) % totalSlides;
    }

    // DOMContentLoaded 이후 슬라이더 작동
    document.addEventListener("DOMContentLoaded", function () {
      setInterval(showNextSlide, 3000);
    });
  </script>

      }
    ];
    document.addEventListener("DOMContentLoaded", function () {
      // 초기화 버튼 클릭 이벤트
      document.getElementById("reset").addEventListener("click", function () {
        document.getElementById("genre").selectedIndex = 0;
        document.getElementById("age").selectedIndex = 0;
        document.getElementById("rating").selectedIndex = 0;
        document.getElementById("keyword").value = "";
        document.getElementById("movie-list").innerHTML = "";
      });

      // 검색 버튼 클릭 이벤트
      document
        .getElementById("search")
        .addEventListener("click", function () {
          const genre = document.getElementById("genre").value;
          const age = document.getElementById("age").value;
          const rating = document.getElementById("rating").value;
          const keyword = document.getElementById("keyword").value.trim();

          const movieList = document.getElementById("movie-list");
          movieList.innerHTML = ""; // 기존 목록 초기화

          // 필터링
          const filteredMovies = movieData.filter((movie) => {
            return (
              (!genre || movie.genre === genre) &&
              (!age || movie.age === age) &&
              (!rating || movie.rating === Number(rating)) &&
              (!keyword || movie.keyword.includes(keyword))
            );
          });

          // 결과 표시
          if (filteredMovies.length > 0) {
            filteredMovies.forEach((movie) => {
              const listItem = document.createElement("li");

              // 이미지 태그 생성
              const img = document.createElement("img");
              img.src = movie.poster; // 포스터 경로
              img.alt = movie.title;
              img.style.width = "200px"; // 이미지 크기 조정
              img.style.height = "300px";

              // 영화 제목 추가
              const title = document.createElement("p");
              title.textContent = movie.title;

              // 리스트 아이템에 추가
              listItem.appendChild(img);
              listItem.appendChild(title);
              movieList.appendChild(listItem);
            });
          } else {
            movieList.innerHTML = "추천 영화가 없습니다.";
          }
        });
    });
  </script>
