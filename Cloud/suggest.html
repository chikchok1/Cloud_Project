<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three Sons Cinema</title>
  <link rel="stylesheet" href="suggest_style.css" />
  <script>
    let currentIndex = 0;

    function showNextSlide() {
      const slides = document.querySelector(".slides");
      const totalSlides = slides.children.length;

      // 현재 슬라이드 인덱스 업데이트
      currentIndex = (currentIndex + 1) % totalSlides;

      // 슬라이드 이동
      slides.style.transform = `translateX(-${currentIndex * 100}%)`;
    }

    // 3초마다 슬라이드 전환
    setInterval(showNextSlide, 3000);

  </script>
</head>

<body>
  <div class="header">
    <h1>Three Sons Cinema</h1>
    <div class="menu">
      <a href="#">로그인</a>
      <a href="#">회원가입</a>
      <a href="#">마이페이지</a>
    </div>
  </div>

  <!-- 네비게이션 바 -->
  <div class="navbar">
    <a href="#">영화</a>
    <a href="#">예매</a>
    <a href="#">매점</a>
    <a href="#">추천</a>
  </div>
  <div class="container">
    <div class="filter-section">
      <select id="genre">
        <option selected disabled>장르</option>
        <option>액션</option>
        <option>코미디</option>
        <option>드라마</option>
        <!-- 추가 장르 선택 옵션 -->
      </select>
      <select id="age">
        <option selected disabled>나이제한</option> <!-- 고정값-->
        <option>전체관람가</option>
        <option>12세 이상</option>
        <option>15세 이상</option>
        <option>청소년 관람불가</option>
      </select>
      <select id="rating">
        <option selected disabled>별점수</option>
        <option>★5.0</option>
        <option>★4.0</option>
        <option>★3.0</option>
        <option>★2.0</option>
        <option>★1.0</option>
      </select>
      <input type="text" id="keyword" placeholder="검색 키워드" />
      <div class="search-btn">
        <button id="reset">초기화</button>
        <button id="search">검색</button>
      </div>
    </div>

    <div id="recommendations" class="container">
      <!-- 추천 영화여기에 동적으로 추가-->
      <link rel="js" href="suggest.js" />
    </div>
    <!--<div class="image-section">
        <img src="image/threeson.jpg" alt="Example Image">
      </div>--> <!-- 여기에 js 구현 -->
  </div>
  <div class="slider">
    <div class="slides">
      <img src="image/threeson.jpg" alt="Photo 1">
      <img src="image/threeson1.jpg" alt="Photo 2">
      <img src="image/threeson2.jpg" alt="Photo 3">
      <img src="image/threeson3.jpg" alt="Photo 4">
      <!-- 더 많은 이미지 추가 -->
    </div>
  </div>

</body>

</html>
